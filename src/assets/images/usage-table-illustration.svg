<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" fill="none">
  <defs>
    <linearGradient id="g" x1="120" y1="140" x2="1080" y2="580" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2DE2E6"/>
      <stop offset="0.5" stop-color="#A642FF"/>
      <stop offset="1" stop-color="#FF2E93"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="720" rx="48" fill="rgba(11,11,22,0.58)"/>
  <rect x="90" y="90" width="1020" height="540" rx="36" fill="rgba(7,7,18,0.70)" stroke="rgba(255,255,255,0.10)"/>

  <text x="130" y="150" font-family="Inter, system-ui, Segoe UI, Roboto, Arial" font-size="32" font-weight="900" fill="url(#g)">
    Regras de uso  Cartăo Presente Digital
  </text>
  <text x="130" y="188" font-family="Inter, system-ui, Segoe UI, Roboto, Arial" font-size="18" font-weight="600" fill="rgba(255,255,255,0.72)">
    Ilustraçăo neutra (xNaMai), para substituir a identidade antiga.
  </text>

  <!-- faux table -->
  <g>
    <rect x="130" y="230" width="940" height="64" rx="18" fill="rgba(45,226,230,0.12)" stroke="rgba(45,226,230,0.25)"/>
    <text x="160" y="272" font-family="Inter, system-ui, Segoe UI, Roboto, Arial" font-size="18" font-weight="800" fill="rgba(255,255,255,0.9)">Pagamento</text>
    <text x="560" y="272" font-family="Inter, system-ui, Segoe UI, Roboto, Arial" font-size="18" font-weight="800" fill="rgba(255,255,255,0.9)">Uso do crédito</text>
  </g>

  <g>
    <rect x="130" y="310" width="940" height="70" rx="18" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.10)"/>
    <text x="160" y="354" font-family="Inter, system-ui, Segoe UI, Roboto, Arial" font-size="18" font-weight="700" fill="rgba(255,255,255,0.85)">Pix</text>
    <text x="560" y="354" font-family="Inter, system-ui, Segoe UI, Roboto, Arial" font-size="18" font-weight="600" fill="rgba(255,255,255,0.75)">Desconto aplicado na forma de pagamento</text>
  </g>
  <g>
    <rect x="130" y="398" width="940" height="70" rx="18" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.10)"/>
    <text x="160" y="442" font-family="Inter, system-ui, Segoe UI, Roboto, Arial" font-size="18" font-weight="700" fill="rgba(255,255,255,0.85)">Crédito</text>
    <text x="560" y="442" font-family="Inter, system-ui, Segoe UI, Roboto, Arial" font-size="18" font-weight="600" fill="rgba(255,255,255,0.75)">Use parte do saldo e complete como preferir</text>
  </g>
  <g>
    <rect x="130" y="486" width="940" height="70" rx="18" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.10)"/>
    <text x="160" y="530" font-family="Inter, system-ui, Segoe UI, Roboto, Arial" font-size="18" font-weight="700" fill="rgba(255,255,255,0.85)">Validade</text>
    <text x="560" y="530" font-family="Inter, system-ui, Segoe UI, Roboto, Arial" font-size="18" font-weight="600" fill="rgba(255,255,255,0.75)">6 meses (renova a cada nova participaçăo)</text>
  </g>
